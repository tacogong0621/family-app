@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ── utils ───────────────────────────────────────────────
function toStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function todayStr() { return toStr(new Date()); }
function tomorrowStr() { const d = new Date(); d.setDate(d.getDate()+1); return toStr(d); }
function addDays(s, n) { const d = new Date(s+'T12:00:00'); d.setDate(d.getDate()+n); return toStr(d); }
function fmtDate(s) {
  const KO = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const d = new Date(s+'T12:00:00');
  return (d.getMonth()+1) + '/' + d.getDate() + '(' + KO[d.getDay()] + ')';
}
function fmtTime(t) {
  if (!t) return 'All day';
  const p = t.split(':').map(Number);
  const h = p[0], m = p[1];
  return (h%12||12) + ':' + String(m).padStart(2,'0') + (h>=12?' PM':' AM');
}
function toMin(t) { if (!t) return -1; const p = t.split(':').map(Number); return p[0]*60+p[1]; }
function evtKey(e) { return (e.date||'') + '|' + (e.summary||e.title||'') + '|' + (e.startTime||''); }

const WD  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const WDK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function weekDates(off) {
  const d = new Date(); d.setDate(d.getDate() + off*7);
  const dy = d.getDay(), df = dy===0 ? -6 : 1-dy;
  d.setDate(d.getDate()+df);
  return Array.from({length:7}, function(_,i){ const dd=new Date(d); dd.setDate(d.getDate()+i); return toStr(dd); });
}

// ── storage ─────────────────────────────────────────────
const stor = {
  get: function(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch(e){ return null; } },
  set: function(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
};

// ── API helper ──────────────────────────────────────────
function getApiHeaders() {
  var setup = stor.get('setup_v3');
  var key = (setup && setup.anthropicApiKey) || '';
  return {
    'Content-Type': 'application/json',
    'anthropic-version': '2025-01-01',
    'anthropic-beta': 'mcp-client-2025-04-04',
    'x-api-key': key,
    'anthropic-dangerous-direct-browser-access': 'true'
  };
}

// ── GCal fetch ──────────────────────────────────────────
async function fetchGCal(from, to) {
  try {
    const prompt = 'Use the Google Calendar tool to list ALL events from ALL calendars from ' + from + ' to ' + to + '. ' +
      'After retrieving, output ONLY a JSON array (no explanation):\n' +
      '[{"title":"event name","calendarName":"calendar name","date":"YYYY-MM-DD","startTime":"HH:MM or null","endTime":"HH:MM or null","location":"location or empty string","isAllDay":false}]\n' +
      'If there are no events, return []. Do not include any text before or after the JSON array.';
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:getApiHeaders(),
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:2000,
        mcp_servers:[{type:'url', url:'https://gcal.mcp.claude.com/mcp', name:'gcal'}],
        messages:[{role:'user', content:prompt}]
      })
    });
    const data = await resp.json();
    // Collect text from all block types: text, mcp_tool_result
    var allText = '';
    (data.content||[]).forEach(function(block) {
      if (block.type === 'text') {
        allText += block.text;
      } else if (block.type === 'mcp_tool_result') {
        var inner = block.content || [];
        inner.forEach(function(b) { if (b.type==='text') allText += b.text; });
      }
    });
    if (!allText) return [];
    var s = allText.indexOf('['), e = allText.lastIndexOf(']');
    if (s < 0) return [];
    return JSON.parse(allText.slice(s, e+1));
  } catch(err) {
    console.error('fetchGCal error:', err);
    return [];
  }
}

function tagEvents(raw, kidNames) {
  return raw.map(function(e) {
    var kidTag = null;
    var title = (e.summary||e.title||'').toLowerCase();
    var cal = (e.calendarName||'').toLowerCase();
    kidNames.forEach(function(name) {
      if (!name) return;
      if (title.includes(name.toLowerCase()) || cal.includes(name.toLowerCase())) kidTag = name;
    });
    return Object.assign({}, e, {kidTag: kidTag});
  });
}

// ── AI briefing ─────────────────────────────────────────
async function runBriefing(events, targetDate, kidNames) {
  if (!events.length) return {summary: fmtDate(targetDate) + ' 일정이 없어요.', alerts:[], actions:[]};
  const evtLines = events.map(function(e) {
    const who = e.kidTag ? '['+e.kidTag+'] ' : '';
    const timeStr = e.startTime ? (e.startTime + '~' + (e.endTime||'?')) : 'All day';
    const locStr = e.location ? ' @'+e.location : '';
    return '• ' + who + '"' + (e.summary||e.title||'') + '" ' + timeStr + locStr;
  });
  const kidDesc = kidNames.filter(Boolean).join(', ') || 'Dana, Brandon';
  const sys = 'You are a family schedule agent for a family with two kids (' + kidDesc + '). Detect: pickup conflicts (same time different places), dinner risk (events after 6pm), overloaded days, routing inefficiency. Output JSON only.';
  const userMsg = fmtDate(targetDate) + ' 일정:\n' + evtLines.join('\n') +
    '\n\n{"summary":"1문장 요약","alerts":[{"level":"red|amber|green|blue","title":"제목","detail":"설명"}],"actions":["액션1","액션2"]}';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:getApiHeaders(),
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:900, system:sys, messages:[{role:'user',content:userMsg}]})
    });
    const data = await resp.json();
    var allTxt = '';
    (data.content||[]).forEach(function(block) {
      if (block.type==='text') allTxt += block.text;
      else if (block.type==='mcp_tool_result') { (block.content||[]).forEach(function(b){if(b.type==='text')allTxt+=b.text;}); }
    });
    const s = allTxt.indexOf('{'), e = allTxt.lastIndexOf('}');
    if (s < 0) return {summary:allTxt||'분석 결과 없음', alerts:[], actions:[]};
    return JSON.parse(allTxt.slice(s, e+1));
  } catch(e) { return {summary:'Analyzing 오류가 발생했어요.', alerts:[], actions:[]}; }
}

// ── AI assistant (with GCal + Gmail MCP) ────────────────
async function runAssistant(userText, conversationHistory, kidNames, calendarContext) {
  const today = todayStr();
  const kidDesc = kidNames.filter(Boolean).join(', ');
  const ctxStr = calendarContext.slice(0,10).map(function(e){
    return e.date + ' ' + e.title + (e.startTime?' '+e.startTime:'');
  }).join(', ');

  const sys = '당신은 ' + kidDesc + ' 두 아이를 키우는 가족의 개인 어시스턴트입니다. ' +
    '오늘은 ' + today + '입니다. 현재 캘린더 미리보기: ' + ctxStr + '. ' +
    'You can create, update, or delete Google Calendar events and send emails. ' +
    'Reply concisely in English. If asked to draft a text message, wrap the message body with --- on its own lines. Confirm what you did clearly.';

  const messages = conversationHistory.concat([{role:'user', content:userText}]);

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:getApiHeaders(),
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:800, system:sys,
      mcp_servers:[
        {type:'url', url:'https://gcal.mcp.claude.com/mcp', name:'gcal'},
        {type:'url', url:'https://gmail.mcp.claude.com/mcp', name:'gmail'}
      ],
      messages: messages
    })
  });
  const data = await resp.json();
  var reply = '';
  (data.content||[]).forEach(function(block) {
    if (block.type==='text') reply += block.text;
    else if (block.type==='mcp_tool_result') { (block.content||[]).forEach(function(b){if(b.type==='text')reply+=b.text;}); }
  });
  return reply.trim() || '처리 중 문제가 생겼어요.';
}

// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
function SetupScreen({onDone}) {
  const [k1, setK1] = useState('Dana');
  const [k2, setK2] = useState('Brandon');
  const [phone, setPhone] = useState('');
  return (
    <div className="setup">
      <h1>Lee Family HQ</h1>
      <p>Reads from Google Calendar and surfaces schedule conflicts, tight pickups, and late evenings.</p>
      <div className="setup-field">
        <label className="setup-lbl">Child 1 Name</label>
        <input className="setup-inp" value={k1} onChange={function(e){setK1(e.target.value);}} placeholder="Dana"/>
      </div>
      <div className="setup-field">
        <label className="setup-lbl">Child 2 Name</label>
        <input className="setup-inp" value={k2} onChange={function(e){setK2(e.target.value);}} placeholder="Brandon"/>
      </div>
      <div className="setup-field">
        <label className="setup-lbl">Spouse Phone Number (문자 전송용)</label>
        <input className="setup-inp" value={phone} onChange={function(e){setPhone(e.target.value);}} placeholder="+12125551234" type="tel"/>
        <div style={{fontSize:11,color:'#bbb',marginTop:5}}>Enter number to open Messages app directly</div>
      </div>
      <button className="setup-btn" onClick={function(){ onDone(k1.trim()||'Dana', k2.trim()||'Brandon', phone.trim()); }}>
        Get Started
      </button>
      <div className="setup-info">
        <div className="setup-info-t">Share Google Calendar</div>
        <div className="setup-info-b">
          Share calendars with each other to see all events in one place.<br/>
          구글 캘린더 → Settings → 특정 사용자와 공유 → 상대방 이메일 Add
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// BRIEFING SECTION
// ══════════════════════════════════════════
function BriefingSection({events, targetDate, kidNames}) {
  const [state, setState] = useState('idle');
  const [result, setResult] = useState(null);
  const cacheKey = 'brief_' + targetDate;
  const targetLabel = targetDate === tomorrowStr() ? 'Tomorrow' : targetDate === todayStr() ? 'Today' : '';

  const load = useCallback(async function(force) {
    if (state === 'loading') return;
    if (!force) {
      const cached = stor.get(cacheKey);
      if (cached && cached.ts > Date.now()-3600000) { setResult(cached.data); setState('done'); return; }
    }
    setState('loading');
    const r = await runBriefing(events, targetDate, kidNames);
    setResult(r); stor.set(cacheKey, {data:r, ts:Date.now()}); setState('done');
  }, [events.length, targetDate]);

  useEffect(function(){ if (events.length > 0) load(false); }, [events.length, targetDate]);

  return (
    <div className="sec">
      <div className="sec-label" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:0}}>
        <span>{'AI 브리핑 — ' + targetLabel + ' ' + fmtDate(targetDate)}</span>
        {state==='done' && <button className="hdr-refresh" onClick={function(){load(true);}}>Refresh</button>}
      </div>
      {state==='loading' && (
        <div style={{paddingTop:16, display:'flex', alignItems:'center', gap:8}}>
          <div className="dots"><span/><span/><span/></div>
          <span style={{fontSize:13,color:'#aaa'}}>일정 Analyzing...</span>
        </div>
      )}
      {state==='done' && result && (
        <div style={{paddingTop:14}}>
          {result.summary && <div className="brief-summary">{result.summary}</div>}
          {(!result.alerts || result.alerts.length===0) && <div className="no-issues">충돌이나 주의 사항이 없어요.</div>}
          <div>
            {(result.alerts||[]).map(function(a,i){
              return (
                <div key={i} className="alert-item">

function ScheduleSection({events, dateLabel}) {
  const [pickup, setPickup] = useState(function(){ return stor.get('pickup_v5')||{}; });

  function toggleOpen(key) {
    var cur = pickup[key]||{};
    var next = Object.assign({}, pickup);
    if (!cur.open) { next[key] = {open:true, dropoff:null, pickup:null}; }
    else { delete next[key]; }
    setPickup(next); stor.set('pickup_v5', next);
  }

  function setField(key, field, who) {
    var cur = pickup[key]||{open:true};
    var next = Object.assign({}, pickup);
    next[key] = Object.assign({}, cur, {open:true});
    next[key][field] = (cur[field]===who) ? null : who;
    setPickup(next); stor.set('pickup_v5', next);
  }

  if (!events || events.length===0) return (
    <div className="sec">
      <div className="sec-label">{dateLabel}</div>
      <div style={{fontSize:13,color:'#ccc',paddingTop:4}}>No events</div>
    </div>
  );
  const sorted = events.slice().sort(function(a,b){
    if (a.isAllDay && !b.isAllDay) return -1;
    if (!a.isAllDay && b.isAllDay) return 1;
    return toMin(a.startTime)-toMin(b.startTime);
  });
  return (
    <div className="sec">
      <div className="sec-label" style={{display:'flex', justifyContent:'space-between'}}>
        <span>{dateLabel+' ('+events.length+')'}</span>
        <span style={{fontWeight:400,letterSpacing:0,textTransform:'none',fontSize:10,color:'#ccc'}}>Tap to assign drop-off & pickup</span>
      </div>
      {sorted.map(function(e,i){
        const key = evtKey(e);
        const ps = pickup[key]||{};
        const isOpen = !!ps.open;
        const kidClass = e.kidTag ? e.kidTag.toLowerCase() : '';
        const parts = [];
        if (ps.dropoff) parts.push('Drop: '+ps.dropoff[0]);
        if (ps.pickup) parts.push('Pickup: '+ps.pickup[0]);
        const summary = parts.join(' · ');
        return (
          <div key={i}>
            <div className="evt" style={{cursor:'pointer'}} onClick={function(){toggleOpen(key);}}>
              <div className="evt-time">{e.isAllDay?'All day':fmtTime(e.startTime)}</div>
              <div className="evt-body">
                <div className="evt-title">{e.summary||e.title}</div>
                {(e.location||(e.endTime&&!e.isAllDay)) && (
                  <div className="evt-sub">
                    {!e.isAllDay&&e.endTime ? '~'+fmtTime(e.endTime) : ''}
                    {!e.isAllDay&&e.endTime&&e.location ? ' · ' : ''}
                    {e.location||''}
                  </div>
                )}
                {!isOpen && summary && <div style={{fontSize:10,color:'#aaa',marginTop:3}}>{summary}</div>}
                {e.kidTag && <span className={'evt-tag '+kidClass}>{e.kidTag}</span>}
              </div>
              <button className={'pickup-btn'+(isOpen?' on':'')}
                onClick={function(ev){ev.stopPropagation();toggleOpen(key);}}>
                {isOpen ? 'Close' : 'Assign'}
              </button>
            </div>
            {isOpen && (
              <div style={{padding:'10px 0 12px 66px',borderTop:'1px solid #f8f8f8'}}>
                <AssignRow label="Drop-off" field="dropoff" ps={ps} onSet={function(f,w){setField(key,f,w);}}/>
                <AssignRow label="Pickup" field="pickup" ps={ps} onSet={function(f,w){setField(key,f,w);}}/>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

async function createEventOnGCal(text, today) {
  // Step 1: Use Claude to parse natural language into structured event data
  var prompt = 'Today is ' + today + ' (America/New_York). ' +
    'Parse this into a Google Calendar event: "' + text + '". ' +
    'If no year specified assume 2026. ' +
    'Return ONLY valid JSON (no markdown, no explanation):\n' +
    '{"title":"event title","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","location":"","isAllDay":false}\n' +
    'If no time, set isAllDay:true and omit startTime/endTime.';
  var resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:getApiHeaders(),
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:300,
      messages:[{role:'user', content:prompt}]
    })
  });
  var data = await resp.json();
  var txt = (data.content||[]).filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('');
  if (!txt) throw new Error('AI parse failed');
  var s = txt.indexOf('{'), e = txt.lastIndexOf('}');
  if (s < 0) throw new Error('No JSON in response');
  var evt = JSON.parse(txt.slice(s, e+1));

  // Step 2: Send to Google Apps Script to create the event
  var setup = stor.get('setup_v3');
  var scriptUrl = setup && setup.appsScriptUrl;
  if (!scriptUrl) throw new Error('Apps Script URL not set');
  var createResp = await fetch(scriptUrl, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({action:'create', event:evt})
  });
  var result = await createResp.json();
  if (result && result.error) throw new Error(result.error);
  var msg = '✅ ' + evt.title + ' — ' + evt.date;
  if (!evt.isAllDay && evt.startTime) msg += ' ' + evt.startTime + (evt.endTime ? '~'+evt.endTime : '');
  return msg;
}

function QuickAdd({onAdded}) {
  const [text, setText] = useState('');
  const [state, setState] = useState('idle'); // idle|loading|done|error
  const [result, setResult] = useState('');
  const inputRef = useRef(null);

  async function submit() {
    var t = text.trim();
    if (!t || state==='loading') return;
    setState('loading');
    try {
      var res = await createEventOnGCal(t, todayStr());
      setResult(res);
      setState('done');
      setText('');
      if (onAdded) onAdded();
      setTimeout(function(){ setState('idle'); setResult(''); }, 4000);
    } catch(e) {
      setResult('오류가 발생했어요. Try Again해주세요.');
      setState('error');
      setTimeout(function(){ setState('idle'); setResult(''); }, 3000);
    }
  }

  return (
    <div className="sec">
      <div className="sec-label">Add Event</div>
      <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
        <textarea
          ref={inputRef}
          style={{flex:1,border:'none',borderBottom:'1px solid'+(state==='loading'?'#ccc':'#000'),padding:'7px 0',fontFamily:'Inter,sans-serif',fontSize:14,outline:'none',color:'#000',background:'transparent',resize:'none',lineHeight:1.5,minHeight:32,maxHeight:72,overflowY:'auto'}}
          placeholder="Add Dana math class next Tuesday 4-5pm"
          value={text}
          rows={1}
          onChange={function(e){setText(e.target.value);}}
          onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}}}
          disabled={state==='loading'}
        />
        <button
          onClick={submit}
          disabled={!text.trim()||state==='loading'}
          style={{padding:'7px 16px',border:'1px solid #000',background:state==='loading'?'#eee':'#000',color:state==='loading'?'#aaa':'#fff',fontFamily:'Inter,sans-serif',fontWeight:600,fontSize:13,cursor:(!text.trim()||state==='loading')?'not-allowed':'pointer',flexShrink:0,marginBottom:0}}>
          {state==='loading' ? <div className="dots" style={{display:'inline-flex'}}><span/><span/><span/></div> : 'Add'}
        </button>
      </div>
      {state==='done' && (
        <div style={{marginTop:10,fontSize:12,color:'#060',lineHeight:1.6,padding:'9px 12px',background:'#f0fff4',borderLeft:'2px solid #0a0'}}>
          {result}
        </div>
      )}
      {state==='error' && (
        <div style={{marginTop:10,fontSize:12,color:'#c00',padding:'8px 12px',background:'#fff5f5',borderLeft:'2px solid #f00'}}>
          {result}
        </div>
      )}
      {state==='idle' && (
        <div style={{marginTop:8,fontSize:11,color:'#ccc',lineHeight:1.6}}>
          Saves to Google Calendar · Press Enter to submit
        </div>
      )}
    </div>
  );
}

function MonthlyTab({allEvents}) {
  const now = new Date();
  const [yr, setYr] = useState(now.getFullYear());
  const [mo, setMo] = useState(now.getMonth());
  const today = todayStr();

  function prevMo() {
    if (mo===0) { setYr(function(y){return y-1;}); setMo(11); }
    else setMo(function(m){return m-1;});
  }
  function nextMo() {
    if (mo===11) { setYr(function(y){return y+1;}); setMo(0); }
    else setMo(function(m){return m+1;});
  }

  const firstDow = new Date(yr, mo, 1).getDay();
  const daysInMo = new Date(yr, mo+1, 0).getDate();
  const prefix = String(yr) + '-' + String(mo+1).padStart(2,'0') + '-';
  const moEvts = allEvents.filter(function(e){ return e.date && e.date.startsWith(prefix); })
    .sort(function(a,b){ return a.date.localeCompare(b.date) || toMin(a.startTime)-toMin(b.startTime); });

  const cells = [];
  for (var i=0; i<firstDow; i++) cells.push(null);

  return (
    <div className="fade" style={{padding:'18px 20px 16px'}}>
      <div className="mo-nav">
        <button className="mo-arrow" onClick={prevMo}>←</button>

        {WDK.map(function(d,i){

        })}
        {cells.map(function(day,i){
          if (!day) return <div key={'e'+i} className="mo-cell"/>;

          return (

              <div className={'mo-num'+(isT?' today':'')} style={{color:!isT&&dow===0?'#c00':undefined}}>{day}</div>

            </div>
          );
        })}
      </div>
      {moEvts.length===0 ? (
        <div style={{fontSize:13,color:'#ccc',paddingTop:8}}>이번 달 일정이 없어요</div>
      ) : moEvts.map(function(e,i){
        const kColor = e.kidTag==='Dana'?'#b89000':e.kidTag==='Brandon'?'#007a30':'#aaa';
        return (
          <div key={i} className="list-row">
            <div className="list-who" style={{color:kColor}}>{e.kidTag||(e.label||'공통')}</div>
            <div className="list-body">
              <div className="list-title">{e.summary||e.title}</div>
              <div className="list-meta">

function AssistantTab({allEvents, kidNames, spousePhone}) {
  const [msgs, setMsgs] = useState([
    {role:'ai', text:'무엇을 도와드릴까요? 캘린더 Add·수정, 일정 요약, 문자 작성 등을 말씀해주세요.'}
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(function(){
    if (bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
  }, [msgs]);

  async function send(text) {
    const txt = (text || input).trim();
    if (!txt || loading) return;
    setInput('');
    const userMsg = {role:'user', text:txt};
    setMsgs(function(m){ return m.concat([userMsg, {role:'ai', text:'...', loading:true}]); });
    setLoading(true);
    const newHistory = history.concat([{role:'user', content:txt}]);
    try {
      const reply = await runAssistant(txt, history, kidNames, allEvents);
      const aiMsg = {role:'ai', text:reply};
      setMsgs(function(m){ return m.slice(0,-1).concat([aiMsg]); });
      setHistory(newHistory.concat([{role:'assistant', content:reply}]));
    } catch(e) {
      setMsgs(function(m){ return m.slice(0,-1).concat([{role:'ai', text:'오류가 발생했어요. Try Again해주세요.'}]); });
    }
    setLoading(false);
  }

  const showExamples = msgs.length <= 1;

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
      <div style={{flex:1, overflowY:'auto', padding:'16px 20px'}}>
        {msgs.map(function(m,i){
          const smsDraft = m.role==='ai' && !m.loading && m.text && m.text.includes('---');
          const smsBody = smsDraft ? m.text.replace(/^[\s\S]*?---\n?/,'').replace(/\n?---[\s\S]*$/,'').trim() : '';
          const smsHref = spousePhone ? 'sms:'+spousePhone+'?body='+encodeURIComponent(smsBody) : 'sms:?body='+encodeURIComponent(smsBody);
          return (
            <div key={i} className={'chat-bubble '+(m.role==='user'?'user':'')}>
              <div className={'bubble-text '+(m.role==='user'?'user':m.loading?'ai loading':'ai done')}>
                {m.loading ? (
                  <div className="dots"><span/><span/><span/></div>
                ) : m.text.split('---').map(function(part, pi){
                  if (pi % 2 === 1) {
                    return (
                      <div key={pi} style={{background:'#f0f0f0',border:'1px solid #ddd',padding:'10px 12px',margin:'8px 0',fontStyle:'normal',whiteSpace:'pre-wrap'}}>
                        {part.trim()}
                      </div>
                    );
                  }
                  return <span key={pi}>{part}</span>;
                })}
              </div>
              {smsDraft && (
                <div style={{marginTop:6}}>
                  <a href={smsHref} style={{display:'inline-block',padding:'7px 16px',border:'1px solid #000',background:'#000',color:'#fff',fontSize:12,fontWeight:600,fontFamily:'Inter,sans-serif',textDecoration:'none',letterSpacing:'.3px'}}>
                    문자 Send
                  </a>
                  {!spousePhone && <span style={{fontSize:11,color:'#aaa',marginLeft:8}}>Save spouse's number in Settings to auto-fill</span>}
                </div>
              )}
            </div>
          );
        })}
        {showExamples && (
          <div style={{marginTop:16}}>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:'.6px',textTransform:'uppercase',color:'#bbb',marginBottom:8}}>예시</div>
            {EXAMPLES.map(function(ex,i){
              return (
                <button key={i} className="chat-ex" onClick={function(){send(ex);}}>
                  {ex}
                </button>
              );
            })}
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input-wrap">
        <textarea
          ref={inputRef}
          className="chat-input"
          placeholder="캘린더 Add·수정, 문자 초안 작성..."
          value={input}
          rows={1}
          onChange={function(e){setInput(e.target.value);}}
          onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
        />
        <button className="chat-send" onClick={function(){send();}} disabled={!input.trim()||loading}>
          전송
        </button>
      </div>
    </div>
  );
}

// MAIN APP

function App() {
  const [setup, setSetup] = useState(function(){ return stor.get('setup_v3'); });
  const [tab, setTab] = useState('today');
  const [loadState, setLoadState] = useState('idle');
  const [allEvents, setAllEvents] = useState([]);
  const kidNames = setup ? [setup.k1, setup.k2] : ['Dana','Brandon'];

  const APPS_SCRIPT_URL = setup && setup.appsScriptUrl ? setup.appsScriptUrl : '';

  const loadEvents = useCallback(async function() {
    setLoadState('loading');
    if (APPS_SCRIPT_URL) {
      try {
        var resp = await fetch(APPS_SCRIPT_URL, {redirect:'follow'});
        var data = await resp.json();
        if (Array.isArray(data) && data.length > 0) {
          setAllEvents(data);
          setLoadState('done');
          stor.set('cached_events', {data: data, ts: Date.now()});
          return;
        }
      } catch(e) {
        // fall through to cache or embedded
      }
    }
    // Use cache if available
    var cached = stor.get('cached_events');
    if (cached && cached.data) {
      setAllEvents(cached.data);
    } else {
      setAllEvents(GCAL_DATA);
    }
    setLoadState('done');
  }, [APPS_SCRIPT_URL]);

  useEffect(function(){ if (setup) loadEvents(); }, [setup]);

  if (!setup) {
    return (
      <div className="page">
        <SetupScreen onDone={function(k1,k2,ph){ const s={k1:k1,k2:k2,phone:ph}; stor.set('setup_v3',s); setSetup(s); }}/>
      </div>
    );
  }

  const today = todayStr();
  const isEvening = new Date().getHours() >= 18;
  const todayCnt = allEvents.filter(function(e){return e.date===today;}).length;
  const NAVS = [
    {id:'today', label:'Today'+(todayCnt>0?' ('+todayCnt+')':'')},
    {id:'weekly', label:'Weekly'},
    {id:'monthly', label:'Monthly'},
    {id:'settings', label:'Settings'},
  ];

  const isReady = true;

  return (
    <div className="page" style={{height:'100vh'}}>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-row">
          <div className="hdr-title">Lee Family HQ</div>
          <div className="hdr-date">{fmtDate(today)}</div>
        </div>
        <div className="hdr-kids">{kidNames.filter(Boolean).join(' · ')}</div>
        <div className="hdr-meta">
          <span className="hdr-mode">{isEvening?'Evening':'Morning'}{setup&&setup.appsScriptUrl?' · 실시간':' · 내장 데이터'}</span>
          <button className="hdr-refresh" onClick={loadEvents} disabled={loadState==='loading'}>
            {loadState==='loading'?<span style={{display:'inline-flex',alignItems:'center',gap:4}}><div className="dots"><span/><span/><span/></div></span>:'Refresh'}
          </button>
        </div>
      </div>

      {/* BODY */}
      <div className="body">
        {!isReady && loadState!=='error' && (
          <div className="center">
            <div className="dots"><span/><span/><span/></div>
            <div className="center-text">구글 캘린더 Loading...<br/><span style={{fontSize:11,color:'#ccc',marginTop:4,display:'block'}}>처음 로드는 10~20초 걸릴 수 있어요</span></div>
          </div>
        )}
        {loadState==='error' && (
          <div className="center">
            <div className="center-text">Couldn't load calendar.<br/>Check your Google Calendar connection.</div>
            <button className="err-btn" onClick={loadEvents}>Try Again</button>
          </div>
        )}
        {isReady && tab==='today' && <TodayTab allEvents={allEvents} kidNames={kidNames} spousePhone={setup?setup.phone:''} onRefresh={loadEvents}/>}
        {isReady && tab==='weekly' && <WeeklyTab allEvents={allEvents}/>}
        {isReady && tab==='monthly' && <MonthlyTab allEvents={allEvents}/>}
        {tab==='settings' && <SettingsTab setup={setup} onSave={function(s){setSetup(s);}}/>}
      </div>

      {/* NAV */}
      <nav className="nav">
        {NAVS.map(function(n){
          return (
            <button key={n.id} className={'nav-btn'+(tab===n.id?' act':'')} onClick={function(){setTab(n.id);}}>
              {n.label}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
